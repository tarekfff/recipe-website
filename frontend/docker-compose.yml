# Docker Compose for Recipe Platform

services:
  postgres:
    image: postgres:15
    container_name: nextjs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password123}
      POSTGRES_DB: ${POSTGRES_DB:-recipe_platform}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  nextjs-dev:
    image: node:20
    container_name: nextjs-app-dev
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npx prisma db push --accept-data-loss &&
        npm run dev -- -H 0.0.0.0
      "
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password123}@postgres:5432/${POSTGRES_DB:-recipe_platform}"
      AUTH_SECRET: "${AUTH_SECRET:-8GZtvJw1fGZT+t3+xCzOeDQhkmf8I9s06To3iaCeT60=}"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXT_PUBLIC_APP_URL: "http://localhost:3000"

  nextjs-prod:
    image: node:20
    container_name: nextjs-app-prod
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    ports:
      - "3001:3000"
    command: >
      sh -c "
        npm install &&
        npx prisma generate &&
        npx prisma db push --accept-data-loss &&
        npm run build &&
        npm start
      "
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password123}@postgres:5432/${POSTGRES_DB:-recipe_platform}"
      AUTH_SECRET: "${AUTH_SECRET:-8GZtvJw1fGZT+t3+xCzOeDQhkmf8I9s06To3iaCeT60=}"
      AUTH_TRUST_HOST: "true"
      NEXTAUTH_URL: "http://localhost:3001"
      NEXT_PUBLIC_APP_URL: "http://localhost:3001"

volumes:
  pgdata: